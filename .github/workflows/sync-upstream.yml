name: Auto Sync Upstream

on:
  # 每 2 小时定时自动运行一次
  schedule:
    - cron: '0 */2 * * *'
  # 允许你在 GitHub Actions 页面手动点击运行
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须赋予写入权限以便推送代码

    steps:
      - name: 检出当前仓库
        uses: actions/checkout@v4
        with:
          # 注意：如果你的仓库默认分支是 master，请将下面的 main 改为 master
          ref: main 
          fetch-depth: 0 # 获取完整的提交历史

      - name: 配置 Git 环境
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: 同步上游主仓库代码
        run: |
          # 1. 添加原作者的主仓库作为 upstream
          git remote add upstream https://github.com/w1249178256/xyzw_web_helper.git
          git fetch upstream
          
          # 2. 将主仓库的代码合并到你的本地分支
          # 注意：如果主仓库的默认分支是 master，请将下面的 upstream/main 改为 upstream/master
          git merge upstream/main -m "Auto-sync with upstream repo"
          
          # 3. 将同步后的代码推送回你的 GitHub 仓库
          # 注意：如果你的默认分支是 master，请将下面的 origin main 改为 origin master
          git push origin main
